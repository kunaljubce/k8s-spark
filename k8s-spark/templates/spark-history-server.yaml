apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-history-server-config
  namespace: spark
data:
  spark-defaults.conf: |
    spark.history.fs.logDirectory file:///mnt/spark-event-logs
    spark.history.ui.port         18080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      serviceAccountName: spark
      containers:
        - name: spark-history-server
          image: spark:v4.1.1
          command:
            - /spark/sbin/start-history-server.sh
            - --properties-file
            - /opt/spark-history/spark-defaults.conf
          ports:
            - containerPort: 18080
              name: http
          volumeMounts:
            - name: spark-event-logs
              mountPath: /mnt/spark-event-logs
            - name: history-config
              mountPath: /opt/spark-history
          env:
            - name: SPARK_HOME
              value: /spark
            - name: SPARK_NO_DAEMONIZE
              value: "true"
      volumes:
        - name: spark-event-logs
          persistentVolumeClaim:
            claimName: spark-event-log-pvc
        - name: history-config
          configMap:
            name: spark-history-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: spark
spec:
  type: NodePort
  selector:
    app: spark-history-server
  ports:
    - port: 18080
      targetPort: 18080
      nodePort: 31808
      name: http
